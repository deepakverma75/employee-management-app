<section class="dashboard-wrap">
  <div class="hero-card">
    <h2>Workforce Snapshot</h2>
    <p>Live statistics from your employee database.</p>
    <div class="count-pill">{{ totalEmployees }} Total Employees</div>
  </div>

  <div class="grid">
    <mat-card>
      <mat-card-header>
        <mat-card-title>Employees by Department</mat-card-title>
      </mat-card-header>
      <div class="chart-switch-wrap">
        <div class="chart-toggle">
          <button class="chart-toggle-btn" [class.active]="departmentChartType === 'pie'" (click)="departmentChartType = 'pie'" aria-label="Switch to Pie Chart">
            <span>Pie</span>
          </button>
          <button class="chart-toggle-btn" [class.active]="departmentChartType === 'bar'" (click)="departmentChartType = 'bar'" aria-label="Switch to Bar Chart">
            <span>Bar</span>
          </button>
        </div>
      </div>
      <mat-card-content>
        <highcharts-chart
          [options]="departmentChartOptions"
          class="chart-host">
        </highcharts-chart>
      </mat-card-content>
    </mat-card>

    <mat-card>
      <mat-card-header>
        <mat-card-title>Employment Type Distribution</mat-card-title>
      </mat-card-header>
      <div class="chart-switch-wrap">
        <div class="chart-toggle">
          <button class="chart-toggle-btn" [class.active]="employmentChartType === 'pie'" (click)="employmentChartType = 'pie'" aria-label="Switch to Pie Chart">
            <span>Pie</span>
          </button>
          <button class="chart-toggle-btn" [class.active]="employmentChartType === 'bar'" (click)="employmentChartType = 'bar'" aria-label="Switch to Bar Chart">
            <span>Bar</span>
          </button>
        </div>
      </div>
      <mat-card-content>
        <highcharts-chart
          [options]="employmentChartOptions"
          class="chart-host">
        </highcharts-chart>
      </mat-card-content>
    </mat-card>
  </div>
</section>

<h2 mat-dialog-title>{{ data.title }}</h2>
<mat-dialog-content>
  <p>{{ data.message }}</p>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-stroked-button (click)="close(false)">{{ data.cancelText || 'Cancel' }}</button>
  <button mat-flat-button class="app-primary-btn" (click)="close(true)">{{ data.confirmText || 'Confirm' }}</button>
</mat-dialog-actions>
